<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Khushi Agarwal</title>
    
    <!-- Fonts and Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./src/styles/style.css">
    
    <style>
        /* Specific Styles for Thank You Page */
        body {
            background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thank-you-container {
            background: white;
            padding: 60px 40px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--color-border);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #dcfce7; /* Light green */
            color: #16a34a; /* Dark green */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s forwards;
            opacity: 0;
            transform: scale(0.5);
            box-shadow: 0 10px 15px -3px rgba(22, 163, 74, 0.2);
        }

        @keyframes scaleIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .thank-you-heading {
            font-size: 2rem;
            margin-bottom: 16px;
            color: var(--color-text-main);
        }

        .thank-you-text {
            color: var(--color-text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .return-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--color-primary);
            color: white;
            padding: 16px 32px;
            border-radius: var(--border-radius-md);
            font-size: 1.05rem;
            font-weight: 600;
            font-family: var(--font-body);
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            text-decoration: none;
            width: 100%;
        }

        .return-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
            color: white;
        }

        .return-btn i {
            transition: transform 0.3s ease;
        }

        .return-btn:hover i {
            transform: translateX(-4px);
        }
        
        @media (max-width: 600px) {
            .thank-you-container {
                padding: 40px 24px;
            }
            .thank-you-heading {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="thank-you-container">
        <div class="success-icon">
            <i class="bi bi-check-lg"></i>
        </div>
        <h1 class="thank-you-heading heading">Thanks for Reaching Out!</h1>
        <p class="thank-you-text">Your message has been sent successfully. I appreciate your interest and will respond as soon as possible.</p>
        <a href="./index.html" class="return-btn">
            <i class="bi bi-arrow-left"></i> Return to Homepage
        </a>
    </div>

</body>
</html>
